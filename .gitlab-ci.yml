image: node:20-alpine

stages:
  - build
  - deploy

cache:
  key:
    files:
      - package.json
  paths:
    - node_modules/

build:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

# GitLab Pages REQUIRES the artifact folder to be named exactly "public"
# and the job MUST be named exactly "pages"
pages:
  stage: deploy
  dependencies:
    - build
  script:
    - mv dist public
    # Create a 404.html that redirects to index.html for SPA routing
    - cp public/index.html public/404.html
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
